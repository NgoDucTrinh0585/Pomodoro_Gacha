                            <div className="flex justify-between items-center border-b border-slate-700/50 pb-5 mb-6 relative z-10">
                                <h2 className="text-xl md:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400 tracking-widest flex items-center gap-3 drop-shadow-md">
                                    <Settings className="w-6 h-6 text-cyan-400 animate-[spin_4s_linear_infinite]" />
                                    TINH CHỈNH HỆ THỐNG
                                </h2>
                                <button onClick={() => setShowSettings(false)} className="bg-slate-800/80 hover:bg-rose-500/20 text-slate-400 hover:text-rose-400 p-2.5 rounded-full transition-all border border-transparent hover:border-rose-500/50 hover:rotate-90 shadow-md">
                                    <X className="w-5 h-5" />
                                </button>
                            </div>

                            {/* 1. LƯỚI CÀI ĐẶT VÒNG QUAY */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 relative z-10 mb-8">
                                {wheels.map(w => (
                                    <div key={w.id} className="relative bg-slate-800/40 p-5 md:p-6 rounded-3xl border border-slate-700/50 space-y-5 hover:bg-slate-800/60 hover:border-slate-500/50 transition-all shadow-lg group">
                                        {/* Hào quang từng thẻ */}
                                        <div className={`absolute top-0 right-0 w-32 h-32 bg-gradient-to-br ${w.color} opacity-5 blur-2xl rounded-full pointer-events-none group-hover:opacity-10 transition-opacity`}></div>
                                        
                                        <div className="flex justify-between items-start relative z-10">
                                            <div>
                                                <h3 className="font-black text-sm text-slate-200 uppercase tracking-widest flex items-center gap-2 drop-shadow-sm">
                                                    <div className={`w-3 h-3 rounded-full bg-gradient-to-br shadow-[0_0_10px_currentColor] ${w.color}`}></div>
                                                    Vòng {w.id}
                                                </h3>
                                                <p className="text-[10px] text-slate-400 mt-2 font-bold bg-slate-950/50 inline-block px-2.5 py-1 rounded-md border border-slate-700/50">{w.items.length} phần thưởng</p>
                                            </div>
                                            <button onClick={() => { setBulkPasteId(w.id); setBulkText(w.items.map(i => i.text).join('\n')); }} className="text-[10px] font-bold bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 border border-blue-500/30 px-3 py-1.5 rounded-lg transition-all flex items-center gap-1.5 shadow-sm hover:shadow-[0_0_15px_rgba(59,130,246,0.2)]">
                                                <Clipboard className="w-3 h-3" /> Dán nhanh
                                            </button>
                                        </div>
                                        
                                        <div className="space-y-4 text-xs relative z-10">
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-bold text-slate-500 uppercase ml-1">Tên vòng quay</label>
                                                <input type="text" value={w.name} onChange={e => handleUpdateWheelConfig(w.id, 'name', e.target.value)} className="w-full bg-slate-950/80 rounded-xl px-4 py-3 focus:ring-1 focus:ring-blue-500 outline-none border border-slate-700/80 text-white font-bold transition-all shadow-inner" placeholder="Tên vòng quay" />
                                            </div>
                                            
                                            <div className="flex items-center gap-3 bg-slate-950/80 rounded-xl px-4 py-2 border border-slate-700/80 shadow-inner focus-within:border-yellow-500/50 transition-colors">
                                                <span className="text-yellow-500/80 font-black uppercase text-[10px] flex items-center gap-1.5">
                                                    <Ticket className="w-3 h-3" /> Giá:
                                                </span>
                                                <input type="number" value={w.cost} onChange={e => handleUpdateWheelConfig(w.id, 'cost', parseInt(e.target.value) || 0)} className="flex-1 bg-transparent py-1.5 outline-none font-black text-yellow-400 text-sm" />
                                            </div>
                                            
                                            {/* --- CÀI ĐẶT GIỜ QUAY --- */}
                                            <div className="bg-slate-950/50 p-4 rounded-xl border border-slate-700/50">
                                                <label className="flex items-center gap-3 cursor-pointer mb-3">
                                                    <div className="relative flex items-center">
                                                        <input 
                                                            type="checkbox" 
                                                            checked={!!w.hasTimeLimit}
                                                            onChange={e => {
                                                                const isChecked = e.target.checked;
                                                                handleUpdateWheelConfig(w.id, 'hasTimeLimit', isChecked);
                                                                if (isChecked && !w.timeFrames) {
                                                                    // Khung giờ mặc định: 00:00 - 23:59
                                                                    handleUpdateWheelConfig(w.id, 'timeFrames', [{ startHour: 0, startMinute: 0, endHour: 23, endMinute: 59 }]);
                                                                }
                                                            }}
                                                            className="peer sr-only"
                                                        />
                                                        <div className="w-8 h-4 bg-slate-700 rounded-full peer peer-checked:bg-emerald-500 transition-colors"></div>
                                                        <div className="absolute left-0.5 top-0.5 w-3 h-3 bg-white rounded-full transition-transform peer-checked:translate-x-4"></div>
                                                    </div>
                                                    <span className={`font-bold text-xs transition-colors ${w.hasTimeLimit ? 'text-emerald-400' : 'text-slate-500'}`}>Giới hạn giờ quay</span>
                                                </label>
                                                

                                                {w.hasTimeLimit && (
                                                    <div className="space-y-2 animate-in fade-in duration-300">
                                                        {(w.timeFrames || []).map((frame, idx) => {
                                                            const safeFrame = {
                                                                startHour: frame.startHour ?? '',
                                                                startMinute: frame.startMinute ?? '',
                                                                endHour: frame.endHour ?? '',
                                                                endMinute: frame.endMinute ?? '',
                                                            };
                                                            return (
                                                                <div key={idx} className="grid grid-cols-[1fr,auto,1fr] items-center gap-1 sm:gap-2 bg-slate-900 p-2 rounded-xl border border-slate-700/80 relative group shadow-inner">
                                                                    
                                                                    {/* Cột bắt đầu */}
                                                                    <div className="grid grid-cols-[1fr,auto,1fr] items-center gap-0.5 sm:gap-1">
                                                                        <input 
                                                                            type="number" min="0" max="23"
                                                                            value={padTime(safeFrame.startHour)}
                                                                            onChange={e => {
                                                                                const val = e.target.value;
                                                                                const newFrames = [...(w.timeFrames || [])];
                                                                                newFrames[idx] = { 
                                                                                    ...newFrames[idx], 
                                                                                    startHour: val === '' ? '' : parseInt(val, 10)
                                                                                };
                                                                                handleUpdateWheelConfig(w.id, 'timeFrames', newFrames);
                                                                            }} 
                                                                            className="w-full min-w-0 h-8 sm:h-9 bg-slate-800 rounded-lg text-center outline-none border border-transparent focus:border-emerald-500/50 font-bold text-slate-200 text-sm appearance-none [&::-webkit-inner-spin-button]:appearance-none" 
                                                                            placeholder="00"
                                                                        />
                                                                        <span className="text-slate-500 font-bold text-sm">:</span>
                                                                        <input 
                                                                            type="number" min="0" max="59"
                                                                            value={padTime(safeFrame.startMinute)}
                                                                            onChange={e => {
                                                                                const val = e.target.value;
                                                                                const newFrames = [...(w.timeFrames || [])];
                                                                                newFrames[idx] = { 
                                                                                    ...newFrames[idx], 
                                                                                    startMinute: val === '' ? '' : parseInt(val, 10)
                                                                                };
                                                                                handleUpdateWheelConfig(w.id, 'timeFrames', newFrames);
                                                                            }} 
                                                                            className="w-full min-w-0 h-8 sm:h-9 bg-slate-800 rounded-lg text-center outline-none border border-transparent focus:border-emerald-500/50 font-bold text-slate-200 text-sm appearance-none [&::-webkit-inner-spin-button]:appearance-none" 
                                                                            placeholder="00"
                                                                        />
                                                                    </div>

                                                                    {/* Mũi tên */}
                                                                    <div className="flex items-center justify-center px-0.5">
                                                                        <span className="text-emerald-400 font-black text-lg drop-shadow-lg">→</span>
                                                                    </div>

                                                                    {/* Cột kết thúc */}
                                                                    <div className="grid grid-cols-[1fr,auto,1fr] items-center gap-0.5 sm:gap-1">
                                                                        <input 
                                                                            type="number" min="0" max="23"
                                                                            value={padTime(safeFrame.endHour)}
                                                                            onChange={e => {
                                                                                const val = e.target.value;
                                                                                const newFrames = [...(w.timeFrames || [])];
                                                                                newFrames[idx] = { 
                                                                                    ...newFrames[idx], 
                                                                                    endHour: val === '' ? '' : parseInt(val, 10)
                                                                                };
                                                                                handleUpdateWheelConfig(w.id, 'timeFrames', newFrames);
                                                                            }} 
                                                                            className="w-full min-w-0 h-8 sm:h-9 bg-slate-800 rounded-lg text-center outline-none border border-transparent focus:border-emerald-500/50 font-bold text-slate-200 text-sm appearance-none [&::-webkit-inner-spin-button]:appearance-none" 
                                                                            placeholder="23"
                                                                        />
                                                                        <span className="text-slate-500 font-bold text-sm">:</span>
                                                                        <input 
                                                                            type="number" min="0" max="59"
                                                                            value={padTime(safeFrame.endMinute)}
                                                                            onChange={e => {
                                                                                const val = e.target.value;
                                                                                const newFrames = [...(w.timeFrames || [])];
                                                                                newFrames[idx] = { 
                                                                                    ...newFrames[idx], 
                                                                                    endMinute: val === '' ? '' : parseInt(val, 10)
                                                                                };
                                                                                handleUpdateWheelConfig(w.id, 'timeFrames', newFrames);
                                                                            }} 
                                                                            className="w-full min-w-0 h-8 sm:h-9 bg-slate-800 rounded-lg text-center outline-none border border-transparent focus:border-emerald-500/50 font-bold text-slate-200 text-sm appearance-none [&::-webkit-inner-spin-button]:appearance-none" 
                                                                            placeholder="59"
                                                                        />
                                                                    </div>

                                                                    {/* Nút xóa */}
                                                                    <button 
                                                                        onClick={() => {
                                                                            const currentFrames = w.timeFrames || [];
                                                                            if (currentFrames.length > 1) {
                                                                                const newFrames = currentFrames.filter((_, i) => i !== idx);
                                                                                handleUpdateWheelConfig(w.id, 'timeFrames', newFrames);
                                                                            } else {
                                                                                handleUpdateWheelConfig(w.id, 'timeFrames', []);
                                                                            }
                                                                        }}
                                                                        className="absolute -top-2 -right-2 bg-rose-500 hover:bg-rose-400 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-all shadow-md hover:scale-110 z-10"
                                                                        title="Xóa khung giờ"
                                                                    >
                                                                        <X className="w-3.5 h-3.5" />
                                                                    </button>
                                                                </div>
                                                            );
                                                        })}

                                                        {/* Nút thêm khung giờ */}
                                                        <button 
                                                            onClick={() => {
                                                                const currentFrames = w.timeFrames || [];
                                                                const newFrames = [...currentFrames, { startHour: '', startMinute: '', endHour: '', endMinute: '' }];
                                                                handleUpdateWheelConfig(w.id, 'timeFrames', newFrames);
                                                            }}
                                                            className="w-full py-2 border border-dashed border-slate-600/60 text-slate-400 rounded-xl text-xs hover:bg-slate-800 hover:border-emerald-500/50 hover:text-emerald-400 transition-colors flex items-center justify-center gap-1.5 font-bold"
                                                        >
                                                            <Plus className="w-4 h-4" /> Thêm khung giờ
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* 2. CHỈNH SỬA CÂU NÓI ĐỘNG LỰC (BẢNG TO - BỎ NÚT KHÔI PHỤC - RỖNG) */}
                            <div className="relative z-10 pt-8 mt-6 border-t border-slate-700/50">
                                <div className="flex items-center gap-4 mb-5">
                                    <div className="p-3 bg-amber-500/20 rounded-xl text-amber-500 shadow-inner border border-amber-500/30">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1-1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                                    </div>
                                    <div>
                                        <h3 className="text-xl font-black text-slate-200 uppercase tracking-widest drop-shadow-sm">Câu nói động lực</h3>
                                        <p className="text-xs text-slate-500 font-bold tracking-wider mt-1">Mỗi dòng 1 câu. Hiển thị ngẫu nhiên khi nhận vé.</p>
                                    </div>
                                </div>

                                <textarea 
                                    className="w-full h-64 bg-slate-950/80 border-2 border-slate-700/80 rounded-2xl p-6 text-slate-300 text-base focus:ring-0 focus:border-amber-500/60 outline-none transition-all font-medium leading-loose shadow-inner"
                                    value={motivationalQuotes.join('\n')}
                                    onChange={(e) => setMotivationalQuotes(e.target.value.split('\n'))}
                                    placeholder="Nhập câu nói của bạn vào đây..."
                                />
                            </div>
                        </div>
                    )}
                    
                    {/* Wheels List - Giao diện Header Banner giống ảnh mẫu */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mt-6">
                        {wheels.map(w => {
                            // --- LOGIC KIỂM TRA (có phút) ---
                            const now = new Date();
                            const currentMinutes = now.getHours() * 60 + now.getMinutes();
                            let isTimeValid = true;
                            let timeDisplayStr = "";
                            if (w.hasTimeLimit) {
                                const frames = w.timeFrames || [];
                                const validFrames = frames.filter(f => 
                                    f.startHour !== '' && f.startMinute !== '' && 
                                    f.endHour !== '' && f.endMinute !== '' &&
                                    !isNaN(f.startHour) && !isNaN(f.startMinute) &&
                                    !isNaN(f.endHour) && !isNaN(f.endMinute)
                                );
                                if (validFrames.length === 0) {
                                    isTimeValid = false;
                                } else {
                                    isTimeValid = validFrames.some(f => {
                                        const start = toMinutes(f.startHour, f.startMinute);
                                        const end = toMinutes(f.endHour, f.endMinute);
                                        return currentMinutes >= start && currentMinutes <= end;
                                    });
                                    timeDisplayStr = validFrames.map(f => 
                                        `${String(f.startHour).padStart(2,'0')}:${String(f.startMinute).padStart(2,'0')} – ${String(f.endHour).padStart(2,'0')}:${String(f.endMinute).padStart(2,'0')}`
                                    ).join(', ');
                                }
                            }
                            const canAfford = tickets >= w.cost;
                            const canSpin = isTimeValid && canAfford;

                            // Lấy linh vật hoặc dùng mặc định nếu lỡ xóa mất
                            const defaultMascots = {1: '🐣', 2: '🦊', 3: '🐉'};
                            const mascot = w.mascot || defaultMascots[w.id] || '✨';

                            return (
                                <div key={w.id} className="relative group pt-4"> 
                                    {/* Linh vật nổi lên ở trên cùng góc phải */}
                                    <div className="absolute -top-4 -right-4 text-6xl drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)] z-20 group-hover:scale-125 group-hover:-rotate-12 transition-transform duration-500 animate-bounce cursor-default" style={{ animationDuration: `${2 + w.id}s` }}>
                                        {mascot}
                                    </div>

                                    {/* Hiệu ứng Ánh sáng (Glow) phía sau card khi hover */}
                                    <div className={`absolute inset-0 top-4 bg-gradient-to-br ${w.color} opacity-0 group-hover:opacity-60 group-hover:-translate-y-2 blur-2xl transition-all duration-500 rounded-[2.5rem] -z-10`}></div>

                                    <div className={`relative bg-slate-800/90 backdrop-blur-sm rounded-[2.5rem] border-2 transition-all duration-500 flex flex-col overflow-hidden shadow-2xl h-full ${canSpin ? `${w.border} group-hover:-translate-y-2` : 'border-slate-700 opacity-80'}`}>
                                                                            
                                        {/* HEADER BANNER */}
                                        <div className={`p-7 bg-gradient-to-br ${w.color} relative overflow-hidden`}>
                                            {/* Họa tiết in chìm siêu to khổng lồ bên trong header */}
                                            <div className="absolute -right-6 -bottom-8 text-8xl opacity-20 rotate-12 pointer-events-none drop-shadow-md">
                                                {mascot}
                                            </div>

                                            <div className="flex items-baseline gap-2 relative z-10">
                                                <h2 className="text-2xl font-black text-white uppercase tracking-tight drop-shadow-md">
                                                    {w.name}
                                                </h2>
                                                <span className="text-xs font-bold text-white/90 bg-black/20 px-2 py-0.5 rounded-full border border-white/10">({w.items.length})</span>
                                            </div>
                                            <div className="inline-block mt-3 bg-black/30 backdrop-blur-md px-3 py-1 rounded-full border border-white/20 shadow-inner">
                                                <p className="text-white text-xs font-black tracking-widest flex items-center gap-1.5">
                                                    <Ticket className="w-3.5 h-3.5 text-yellow-300"/> {w.cost} VÉ / LẦN
                                                </p>
                                            </div>
                                        </div>

                                        {/* PHẦN NÚT BẤM VÀ GIỜ */}
                                        <div className="p-5 mt-auto flex flex-col gap-3 w-full box-border bg-slate-900/40 rounded-b-[2.5rem]">
                                            {w.hasTimeLimit && (() => {
                                            const frames = w.timeFrames || [];
                                            const validFrames = frames.filter(f => 
                                                f.startHour !== '' && f.startMinute !== '' && 
                                                f.endHour !== '' && f.endMinute !== '' &&
                                                !isNaN(f.startHour) && !isNaN(f.startMinute) &&
                                                !isNaN(f.endHour) && !isNaN(f.endMinute)
                                            );
                                            if (validFrames.length === 0) return null;

                                            // Hàm xác định màu dựa trên thời gian hiện tại
                                            const getStatusColor = (frame) => {
                                                const start = toMinutes(frame.startHour, frame.startMinute);
                                                const end = toMinutes(frame.endHour, frame.endMinute);
                                                if (currentMinutes < start) return 'text-white';        // chưa đến
                                                if (currentMinutes > end) return 'text-red-400';       // đã qua
                                                return 'text-emerald-400';                              // đang trong
                                            };

                                            return (
                                                <div className="text-sm sm:text-base font-bold text-center py-3 px-4 rounded-xl border bg-slate-900/60 border-slate-700/60">
                                                <div className="flex items-center justify-center gap-1 mb-2">
                                                    <span className="animate-pulse">⏳</span>
                                                    <span>Mở quay</span>
                                                </div>

                                                {validFrames.length === 1 ? (
                                                    // Một khung giờ - căn giữa
                                                    <div className="flex justify-center">
                                                    <div className={`bg-slate-800/90 px-3 py-1.5 rounded-lg text-xs sm:text-sm font-mono border border-slate-600/50 ${getStatusColor(validFrames[0])}`}>
                                                        {`${String(validFrames[0].startHour).padStart(2, '0')}:${String(validFrames[0].startMinute).padStart(2, '0')} – ${String(validFrames[0].endHour).padStart(2, '0')}:${String(validFrames[0].endMinute).padStart(2, '0')}`}
                                                    </div>
                                                    </div>
                                                ) : (
                                                    // Nhiều khung giờ - lưới 2 cột
                                                    <div className="grid grid-cols-2 gap-1 sm:gap-2">
                                                    {validFrames.map((frame, idx) => (
                                                        <div key={idx} className={`bg-slate-800/90 px-2 py-1 rounded text-[10px] sm:text-xs font-mono border border-slate-600/50 ${getStatusColor(frame)}`}>
                                                        {`${String(frame.startHour).padStart(2, '0')}:${String(frame.startMinute).padStart(2, '0')} – ${String(frame.endHour).padStart(2, '0')}:${String(frame.endMinute).padStart(2, '0')}`}
                                                        </div>
                                                    ))}
                                                    </div>
                                                )}
                                                </div>
                                            );
                                            })()}

                                            <button 
                                                onClick={() => canSpin && openWheel(w)}
                                                disabled={!canSpin}
                                                className={`w-full mx-auto py-3.5 rounded-2xl font-black text-sm tracking-widest transition-all shadow-md flex items-center justify-center gap-2 text-center
                                                    ${canSpin 
                                                        ? `bg-gradient-to-r ${w.color} text-white hover:brightness-110 active:scale-95 border-none` 
                                                        : 'bg-slate-800 text-slate-500 cursor-not-allowed border border-slate-700'}`}
                                            >
                                                {!isTimeValid ? (
                                                    <div className="flex items-center justify-center gap-2">
                                                        <span className="opacity-50 text-base">🔒</span>
                                                        <span>CHƯA ĐẾN GIỜ</span>
                                                    </div>
                                                ) : (
                                                    <div className="flex items-center justify-center gap-2">
                                                        <span className="animate-dice text-2xl">🎲</span>
                                                        <span className="tracking-[0.2em]">TRIỆU HỒI NGAY</span>
                                                    </div>
                                                )}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* ============================================================
                        MODAL 1: RESET VÉ - PHONG CÁCH ĐỎ BỐC CHÁY & ĐỐM LỬA 3D
                        ============================================================ */}
                    {showResetConfirm && (
                        <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-[250] flex items-center justify-center p-6 animate-in fade-in duration-300">
                            <div className="relative bg-slate-900 border-2 border-red-500/50 w-full max-w-md rounded-[2.5rem] p-8 shadow-[0_0_60px_rgba(239,68,68,0.4)] animate-in zoom-in-95 duration-300 overflow-hidden">
                                
                                {/* Decor: Ánh lửa mờ và Mặt giận ở góc phải */}
                                <div className="absolute -top-6 -right-6 w-32 h-32 bg-red-600/20 blur-[40px] rounded-full"></div>
                                <div className="absolute top-4 right-6 opacity-20 rotate-12">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                        <circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
                                    </svg>
                                </div>
                                
                                {/* ICON ĐỐM LỬA 3D GLOW */}
                                <div className="relative w-40 h-40 mx-auto mb-2 flex items-center justify-center">
                                    <div className="absolute inset-0 bg-red-600/20 blur-[50px] rounded-full animate-pulse"></div>
                                    <div className="absolute top-1/4 left-1/4 w-2 h-2 bg-yellow-400 rounded-full animate-ping"></div>
                                    <div className="absolute bottom-1/4 right-1/4 w-1 h-1 bg-orange-500 rounded-full animate-ping delay-300"></div>

                                    <div className="relative z-10 filter drop-shadow-[0_0_20px_rgba(239,68,68,0.8)]">
                                        <svg width="100" height="100" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M12 2C12 2 3 7 3 14C3 18.9706 7.02944 23 12 23C16.9706 23 21 18.9706 21 14C21 7 12 2 12 2Z" fill="url(#fireGradient1)" className="animate-pulse" />
                                            <path d="M12 7C12 7 6 10.5 6 15C6 18.3137 8.68629 21 12 21C15.3137 21 18 18.3137 18 15C18 10.5 12 7 12 7Z" fill="url(#fireGradient2)" className="animate-bounce" style={{ animationDuration: '3s' }} />
                                            <path d="M12 12C12 12 9 14 9 17C9 18.6569 10.3431 20 12 20C13.6569 20 15 18.6569 15 17C15 14 12 12 12 12Z" fill="#FFF7ED" />
                                            <defs>
                                                <linearGradient id="fireGradient1" x1="12" y1="23" x2="12" y2="2" gradientUnits="userSpaceOnUse">
                                                    <stop offset="0" stopColor="#991b1b" /><stop offset="0.6" stopColor="#dc2626" /><stop offset="1" stopColor="#f97316" />
                                                </linearGradient>
                                                <linearGradient id="fireGradient2" x1="12" y1="21" x2="12" y2="7" gradientUnits="userSpaceOnUse">
                                                    <stop offset="0" stopColor="#ea580c" /><stop offset="1" stopColor="#fbbf24" />
                                                </linearGradient>
                                            </defs>
                                        </svg>
                                    </div>
                                </div>

                                <div className="relative text-center">
                                    <h3 className="text-3xl font-[1000] text-transparent bg-clip-text bg-gradient-to-b from-white to-red-400 mb-3 tracking-tighter italic uppercase">
                                        RESET TẤT CẢ?
                                    </h3>
                                    <p className="text-red-200/70 text-base leading-relaxed mb-8 font-medium italic">
                                        Cảnh báo! <span className="text-white font-black bg-red-600 px-2 py-0.5 rounded shadow-[0_0_10px_rgba(239,68,68,0.5)]"> Toàn bộ số vé</span>sẽ bị <span className="text-white font-black bg-red-600 px-2 py-0.5 rounded shadow-[0_0_10px_rgba(239,68,68,0.5)]">thiêu rụi về 0</span> .
                                    </p>
                                </div>

                                <div className="flex flex-col gap-4 relative">
                                    <button onClick={performReset} className="w-full py-5 bg-gradient-to-r from-red-600 via-orange-600 to-red-700 hover:from-red-500 hover:to-red-600 rounded-2xl font-black text-white transition-all shadow-[0_15px_30px_rgba(220,38,38,0.4)] active:scale-95 uppercase tracking-tighter text-lg flex items-center justify-center gap-2 group">
                                        <span>RESET NGAY LẬP TỨC 😠</span>
                                    </button>
                                    <button onClick={() => setShowResetConfirm(false)} className="w-full py-3 bg-transparent hover:bg-white/5 rounded-2xl font-bold text-slate-500 hover:text-white transition-all active:scale-95 uppercase tracking-[0.3em] text-xs">
                                        Đùa thôi bạn ey
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL DÁN NHANH (BULK PASTE) - GIAO DIỆN RỘNG --- */}
                    {bulkPasteId && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[300] flex items-center justify-center p-4 animate-in fade-in duration-300">
                            <div className="bg-slate-900 border border-blue-500/30 w-full max-w-2xl rounded-[2.5rem] overflow-hidden shadow-[0_0_100px_rgba(59,130,246,0.2)] animate-in zoom-in-95 duration-300">
                                <div className="bg-gradient-to-r from-blue-600 to-cyan-600 px-8 py-6 flex justify-between items-center">
                                    <div>
                                        <h3 className="text-xl font-black text-white uppercase tracking-tighter flex items-center gap-2">
                                            <Clipboard className="w-6 h-6" /> Dán nhanh phần thưởng
                                        </h3>
                                        <p className="text-blue-100/70 text-xs font-bold uppercase tracking-widest mt-1">Đang chỉnh sửa Vòng {bulkPasteId}</p>
                                    </div>
                                    <button onClick={() => setBulkPasteId(null)} className="text-white/50 hover:text-white transition-colors">
                                        <X className="w-8 h-8" />
                                    </button>
                                </div>
                                
                                <div className="p-8">
                                    <div className="mb-4 bg-blue-500/10 border border-blue-500/20 rounded-xl p-4 flex items-start gap-3">
                                        <div className="text-blue-400 mt-0.5 font-bold text-lg">!</div>
                                        <p className="text-blue-200/80 text-xs leading-relaxed font-medium">
                                            Nhập hoặc dán danh sách phần thưởng của bạn vào ô dưới đây. <br/>
                                            <span className="text-white font-bold">Mỗi dòng tương ứng với một phần thưởng.</span>
                                        </p>
                                    </div>

                                    <textarea 
                                        className="w-full h-80 bg-slate-950 border border-slate-700 rounded-2xl p-6 text-slate-200 text-base focus:ring-2 focus:ring-blue-500 outline-none transition-all font-mono leading-loose shadow-inner"
                                        value={bulkText}
                                        onChange={(e) => setBulkText(e.target.value)}
                                        placeholder="Ví dụ:&#10;Ăn một thanh socola&#10;Xem Youtube 10 phút&#10;Chơi 1 ván game..."
                                        autoFocus
                                    />

                                    <div className="grid grid-cols-2 gap-4 mt-8">
                                        <button 
                                            onClick={() => setBulkPasteId(null)}
                                            className="py-4 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-2xl font-bold transition-all active:scale-95 uppercase tracking-widest text-xs"
                                        >
                                            Hủy bỏ
                                        </button>
                                        <button 
                                            onClick={() => {
                                                const newItems = bulkText.split('\n')
                                                    .filter(line => line.trim() !== '')
                                                    .map((text, index) => ({ id: index + 1, text: text.trim(), weight: 1 }));
                                                handleUpdateWheelConfig(bulkPasteId, 'items', newItems);
                                                setBulkPasteId(null);
                                            }}
                                            className="py-4 bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white rounded-2xl font-black transition-all shadow-lg active:scale-95 uppercase tracking-widest text-sm"
                                        >
                                            Cập nhật ngay
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* LỊCH SỬ QUAY - BẢNG PHONG THẦN */}
                    {spinHistory.length > 0 && (
                        <div className="mt-12 glass-card rounded-[2.5rem] border border-slate-700/60 p-6 sm:p-8 shadow-[0_10px_40px_rgba(0,0,0,0.5)] relative overflow-hidden">
                            {/* Hiệu ứng sương mù phát sáng mờ ảo ở các góc */}
                            <div className="absolute top-0 right-0 w-64 h-64 bg-emerald-500/5 rounded-full blur-3xl pointer-events-none"></div>
                            <div className="absolute bottom-0 left-0 w-64 h-64 bg-blue-500/5 rounded-full blur-3xl pointer-events-none"></div>
                            
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 relative z-10 gap-4 border-b border-slate-700/50 pb-5">
                                <div className="flex items-center gap-3">
                                    <span className="text-4xl drop-shadow-md animate-bounce" style={{ animationDuration: '3s' }}>📜</span>
                                    <h3 className="text-xl sm:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 tracking-wider">
                                        Lịch Sử Quay
                                    </h3>
                                </div>
                                <button onClick={clearHistory} className="px-5 py-2.5 bg-rose-500/10 hover:bg-rose-500/20 border border-rose-500/30 rounded-xl font-bold text-rose-400 text-xs sm:text-sm transition-all shadow-[0_0_15px_rgba(244,63,94,0.1)] flex items-center gap-2 hover:scale-105 active:scale-95 group">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="group-hover:rotate-12 transition-transform"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                                    Xóa toàn bộ
                                </button>
                            </div>

                            {/* Danh sách cuộn mượt mà */}
                            <div className="space-y-4 relative z-10 max-h-[450px] overflow-y-auto pr-2" style={{ scrollbarWidth: 'thin', scrollbarColor: '#334155 transparent' }}>
                                {spinHistory.map((record, index) => {
                                    const colors = getColorClassesFromWheel(record.wheelColor);
                                    const relativeDate = getRelativeDate(record.timestamp);
                                    
                                    return (
                                    <div key={record.id} className="group relative bg-slate-900/40 hover:bg-slate-800/80 backdrop-blur-sm p-4 sm:p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 rounded-2xl transition-all duration-300 border border-slate-700/50 hover:border-slate-500/50 hover:shadow-lg hover:-translate-y-1 animate-in fade-in zoom-in-95" style={{ animationDelay: `${Math.min(index * 50, 500)}ms`, animationFillMode: 'both' }}>
                                        
                                        {/* Dải màu viền bên trái bám sát viền mượt hơn */}
                                        <div className={`absolute left-0 top-0 bottom-0 w-1.5 rounded-l-2xl bg-gradient-to-b ${colors.bag} opacity-60 group-hover:opacity-100 transition-opacity shadow-[0_0_10px_currentColor]`}></div>

                                        <div className="flex items-start sm:items-center gap-4 flex-1 pl-3">
                                            {/* Khung thời gian kiểu lịch */}
                                            <div className="flex flex-col items-center justify-center min-w-[70px]">
                                                <span className={`text-[10px] font-black uppercase tracking-wider ${colors.text} opacity-80 mb-0.5`}>
                                                    {relativeDate || 'Hôm nay'}
                                                </span>
                                                <span className="text-sm font-black text-slate-200 bg-slate-950/60 px-2.5 py-1 rounded-lg border border-slate-700/80 shadow-inner">
                                                    {record.time}
                                                </span>
                                            </div>
                                            
                                            {/* Đường gạch dọc mờ phân cách */}
                                            <div className="hidden sm:block w-px h-10 bg-slate-700/50"></div>

                                            {/* Cụm thông tin phần thưởng */}
                                            <div className="flex-1 min-w-0">
                                                <p className="text-[10px] font-bold text-slate-400 uppercase leading-none mb-1.5 flex items-center gap-1.5">
                                                    <span className={`w-2 h-2 rounded-full animate-pulse bg-gradient-to-r ${colors.bag}`}></span>
                                                    {record.wheelName}
                                                </p>
                                                <p className={`font-black text-sm sm:text-base truncate drop-shadow-md ${colors.text}`}>
                                                    {record.prize}
                                                </p>
                                            </div>
                                        </div>

                                        {/* Khung Phí Vé & Nút Xóa */}
                                        <div className="flex items-center justify-between sm:justify-end gap-5 border-t border-slate-700/50 sm:border-none pt-3 sm:pt-0 pl-3 sm:pl-0">
                                            <div className="flex items-center gap-2 bg-slate-950/40 px-3 py-1.5 rounded-xl border border-yellow-500/20 shadow-inner">
                                                <span className="text-base font-black text-yellow-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.5)]">-{record.cost} vé</span>
                                            </div>
                                            <button onClick={() => deleteFromHistory(record.id)} className="text-slate-600 hover:text-rose-400 sm:opacity-0 group-hover:opacity-100 transition-all p-2.5 sm:bg-slate-900/80 rounded-full hover:bg-rose-500/10 hover:shadow-[0_0_15px_rgba(244,63,94,0.3)] border border-transparent hover:border-rose-500/30" title="Xóa bản ghi này">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                            </button>
                                        </div>
                                    </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {/* MODAL 2: XÓA LỊCH SỬ - THÙNG RÁC BỐC CHÁY */}
                    {showClearHistoryConfirm && (
                        <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-[250] flex items-center justify-center p-6 animate-in fade-in duration-300">
                            <div className="relative bg-slate-900 border-2 border-red-500/50 w-full max-w-md rounded-[2.5rem] p-8 shadow-[0_0_60px_rgba(239,68,68,0.4)] animate-in zoom-in-95 duration-300 overflow-hidden">
                                
                                {/* Decor: Ánh lửa mờ và Mặt giận ở góc phải */}
                                <div className="absolute -top-6 -right-6 w-32 h-32 bg-red-600/20 blur-[40px] rounded-full"></div>
                                <div className="absolute top-4 right-6 opacity-20 rotate-12">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                        <circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
                                    </svg>
                                </div>
                                
                                {/* ICON THÙNG RÁC BỐC CHÁY */}
                                <div className="relative w-40 h-40 mx-auto mb-2 flex items-center justify-center">
                                    {/* Quầng lửa phía sau */}
                                    <div className="absolute inset-0 bg-red-600/30 blur-[45px] rounded-full animate-pulse"></div>
                                    
                                    <div className="relative z-10 flex items-center justify-center">
                                        
                                        {/* Icon Thùng rác nằm đè lên lửa */}
                                        <div className="relative z-20 bg-slate-900/50 p-4 rounded-full border border-white/20 backdrop-blur-sm shadow-xl animate-bounce" style={{ animationDuration: '2s' }}>
                                            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]">
                                                <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 5v6m4-6v6" />
                                            </svg>
                                        </div>
                                    </div>
                                </div>

                                <div className="relative text-center">
                                    <h3 className="text-3xl font-[1000] text-transparent bg-clip-text bg-gradient-to-b from-white to-red-400 mb-3 tracking-tighter italic uppercase">
                                        XÓA SẠCH LỊCH SỬ?
                                    </h3>
                                    <p className="text-red-200/70 text-base leading-relaxed mb-8 font-medium italic">
                                        Dữ liệu quay sẽ bị ném vào <span className="text-white font-black bg-red-600 px-2 py-0.5 rounded shadow-[0_0_10px_rgba(239,68,68,0.5)] uppercase">lò lửa</span> vĩnh viễn.
                                    </p>
                                </div>

                                <div className="flex flex-col gap-4 relative">
                                    <button 
                                        onClick={confirmClearHistory} 
                                        className="w-full py-5 bg-gradient-to-r from-red-600 via-orange-600 to-red-700 hover:from-red-500 hover:to-red-600 rounded-2xl font-black text-white transition-all shadow-[0_15px_30px_rgba(220,38,38,0.4)] active:scale-95 uppercase tracking-tighter text-lg flex items-center justify-center gap-2 group"
                                    >
                                        <span>THIÊU RỤI LỊCH SỬ</span>
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="group-hover:animate-spin"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
                                    </button>
                                    
                                    <button 
                                        onClick={() => setShowClearHistoryConfirm(false)} 
                                        className="w-full py-3 bg-transparent hover:bg-white/5 rounded-2xl font-bold text-slate-500 hover:text-white transition-all active:scale-95 uppercase tracking-[0.3em] text-xs"
                                    >
                                        Đùa thôi
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: CHÚC MỪNG NHẬN VÉ (TOÀN MÀN HÌNH - TRONG SUỐT) */}
                    {rewardModal && (
                        <div className="fixed inset-0 z-[150] flex flex-col items-center justify-center bg-black/70 backdrop-blur-md p-4 animate-in fade-in duration-300" onClick={() => setRewardModal(null)}>
                            <div className="flex flex-col items-center justify-center text-center transform scale-100 animate-in zoom-in-95 duration-500 w-full" onClick={e => e.stopPropagation()}>
                                <div className="text-7xl mb-6 animate-bounce">🎉</div>
                                <h3 className="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-4 uppercase drop-shadow-[0_0_15px_rgba(52,211,153,0.5)]">
                                    Thank you!
                                </h3>
                                
                                <p className="text-xl md:text-2xl text-slate-200 mb-12 font-medium">
                                    Cảm ơn sự cố gắng của cậu <br/>
                                    <span className="text-7xl md:text-8xl font-black text-yellow-400 drop-shadow-[0_0_20px_rgba(250,204,21,0.6)] mx-2">+{rewardModal.amount}</span> 
                                    <span className="text-3xl font-bold text-yellow-500">VÉ</span>
                                </p>

                                <div className="relative max-w-3xl px-8 py-4 mb-10">
                                    <span className="text-6xl text-emerald-500/30 absolute -top-4 left-0 leading-none font-serif">"</span>
                                    <p className="text-emerald-100 font-bold italic relative z-10 text-2xl md:text-3xl leading-relaxed drop-shadow-lg">
                                        {rewardModal.quote}
                                    </p>
                                    <span className="text-6xl text-emerald-500/30 absolute -bottom-8 right-0 leading-none font-serif">"</span>
                                </div>

                                <button 
                                    onClick={() => setRewardModal(null)}
                                    className="px-10 py-4 bg-white/10 hover:bg-white/20 border border-white/20 backdrop-blur-lg rounded-full font-black text-white text-lg transition-all shadow-[0_0_30px_rgba(255,255,255,0.1)] active:scale-95 flex items-center gap-2"
                                >
                                    CẤT VÀO TÚI NGAY
                                </button>
                            </div>
                        </div>
                    )}
            
                    {activeWheel && (
                        <SpinWheelModal 
                            wheel={activeWheel} 
                            onClose={() => setActiveWheel(null)} 
                            onRecordPrize={(wheelName, prize, cost, wheelColor) => {
                                // CHUYỂN PHẦN TÍNH TOÁN LÊN TRÊN CÙNG
                                let deductedCost = cost;
                                let bonus = 0;
                                const prizeTextLower = prize.toLowerCase();

                                // 1. Xử lý "Giữ vé", "Giữ thẻ", "Hoàn vé" (Mở rộng từ khóa cho an toàn)
                                if (prizeTextLower.includes("giữ vé") || 
                                    prizeTextLower.includes("giữ thẻ") || 
                                    prizeTextLower.includes("hoàn vé") ||
                                    prizeTextLower.includes("free spin")) {
                                    deductedCost = 0;
                                }

                                // 2. Xử lý "Tặng X vé"
                                const bonusMatch = prizeTextLower.match(/tặng\s+(\d+)\s+vé/);
                                if (bonusMatch) {
                                    bonus = parseInt(bonusMatch[1], 10);
                                }

                                // 3. LƯU LỊCH SỬ VỚI SỐ VÉ THỰC TẾ BỊ TRỪ (deductedCost thay vì cost gốc)
                                addToHistory(wheelName, prize, deductedCost, wheelColor);

                                // 4. Cập nhật lại tổng số vé
                                setTickets(prevTickets => prevTickets - deductedCost + bonus);

                                // 5. NẾU CÓ TẶNG VÉ -> HIỆN POPUP CHÚC MỪNG VÀ BẮN PHÁO HOA
                                if (bonus > 0) {
                                    setTimeout(() => {
                                        const randomQuote = motivationalQuotes.length > 0
                                            ? motivationalQuotes[Math.floor(Math.random() * motivationalQuotes.length)]
                                            : "Hoàn thành xuất sắc! Tiếp tục giữ vững phong độ nhé!";
                                        setRewardModal({ amount: bonus, quote: randomQuote });

                                        const duration = 3 * 1000;
                                        const animationEnd = Date.now() + duration;
                                        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 200 }; 
                                        const randomInRange = (min, max) => Math.random() * (max - min) + min;

                                        const interval = setInterval(function() {
                                            const timeLeft = animationEnd - Date.now();
                                            if (timeLeft <= 0) {
                                                return clearInterval(interval);
                                            }
                                            const particleCount = 50 * (timeLeft / duration);
                                            confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
                                            confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
                                        }, 250);
                                    }, 300);
                                }
                            }}
                            onFinish={() => setActiveWheel(null)}
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
