<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Gacha</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=3">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png?v=3">
    <link rel="manifest" href="manifest.json?v=3">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Thư viện hiệu ứng pháo hoa -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics-compat.js"></script>

    <style>
        .wheel-spin {
            transition: transform 4.5s cubic-bezier(0.2, 0.8, 0.1, 1);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }
        body {
            touch-action: manipulation;
        }

        /* Ẩn mũi tên lên/xuống của ô nhập số để số nằm ngay giữa */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            appearance: none; /* Thêm dòng này */
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield; /* Thêm dòng này */
        }
    </style>
</head>
<body class="bg-slate-900 overflow-x-hidden text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        // =============================================================
        // KHỞI TẠO FIREBASE
        // =============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAQirF3UZx_HMQNf-FsGuKbP1uhmXMPFRY",
            authDomain: "pomodorogacha-103b4.firebaseapp.com",
            projectId: "pomodorogacha-103b4",
            storageBucket: "pomodorogacha-103b4.firebasestorage.app",
            messagingSenderId: "882119417918",
            appId: "1:882119417918:web:dd094c4a580b7aa625316f",
            measurementId: "G-TVZ1SJ28J0"
        };

        // Khởi tạo app Firebase nếu chưa có
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        // Bật Analytics (tuỳ chọn)
        const analytics = firebase.analytics();
        
        // Khởi tạo Firestore database để chuẩn bị đồng bộ dữ liệu
        const db = firebase.firestore();

        // =============================================================
        // CẤU HÌNH ÂM THANH TẠI ĐÂY
        // Mỗi vòng quay có âm thanh riêng [spinning, fireworks, spinAgain]
        // =============================================================
        const SOUND_CONFIG = [
            { spinning: 'nhac_nen_tro_choi_vui_nhon_team_building_game_show-www_tiengdong_com.mp3', fireworks: 'Am_thanh_chuc_mung_chien_thang-www_tiengdong_com.mp3', spinAgain: 'nhac_nen_tro_choi_vui_nhon_team_building_game_show-www_tiengdong_com.mp3' },  // Vòng 1
            { spinning: 'vong2.mp3', fireworks: 'Am_thanh_chuc_mung_chien_thang-www_tiengdong_com.mp3', spinAgain: 'vong2.mp3' },  // Vòng 2
            { spinning: 'nhac_beat_lo_to_nhac_nen_keu_loto-www_tiengdong_com.mp3', fireworks: 'Am_thanh_chuc_mung_chien_thang-www_tiengdong_com.mp3', spinAgain: 'nhac_beat_lo_to_nhac_nen_keu_loto-www_tiengdong_com.mp3' }   // Vòng 3
        ];

        // --- ICONS ---
        const Icon = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Sparkles = ({className}) => <Icon className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></Icon>;
        const Ticket = ({className}) => <Icon className={className}><path d="M2 9V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 0 0 4v4a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-4a2 2 0 0 0 0-4Z"/><path d="M13 3v18"/><path d="M13 8h1"/><path d="M13 12h1"/><path d="M13 16h1"/></Icon>;
        const Flame = ({className}) => <Icon className={className}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></Icon>;
        const Play = ({className}) => <Icon className={className}><polygon points="5 3 19 12 5 21 5 3"/></Icon>;
        const Plus = ({className}) => <Icon className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
        const Trash2 = ({className}) => <Icon className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>;
        const Settings = ({className}) => <Icon className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;
        const X = ({className}) => <Icon className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
        const Check = ({className}) => <Icon className={className}><polyline points="20 6 9 17 4 12"/></Icon>;
        const Clipboard = ({className}) => <Icon className={className}><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></Icon>;
        const AlertCircle = ({className}) => <Icon className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;

        const WHEEL_COLORS_PALETTE = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4', '#3b82f6', '#a855f7', '#ec4899'];
        const GRADIENT_OPTIONS = [
            { id: 'blue', label: 'Xanh dương', color: 'from-blue-500 to-cyan-400', border: 'border-blue-500/30' },
            { id: 'purple', label: 'Tím hồng', color: 'from-purple-500 to-pink-500', border: 'border-purple-500/30' },
            { id: 'orange', label: 'Vàng cam', color: 'from-yellow-400 to-orange-500', border: 'border-yellow-500/30' },
            { id: 'green', label: 'Xanh lá', color: 'from-green-500 to-emerald-400', border: 'border-green-500/30' }
        ];

        // --- COMPONENT VÒNG QUAY (MODAL) ---
        function SpinWheelModal({ wheel, onClose, onRecordPrize, onFinish }) {
            const [rotation, setRotation] = useState(0);
            const [isSpinning, setIsSpinning] = useState(false);
            const [prize, setPrize] = useState(null);

            const spinSoundRef = useRef(null);
            const fireworksSoundRef = useRef(null);
            const spinAgainSoundRef = useRef(null);

            useEffect(() => {
                const soundIndex = wheel.id - 1;
                const soundConfig = SOUND_CONFIG[soundIndex] || SOUND_CONFIG[0];
                spinSoundRef.current = new Audio(soundConfig.spinning);
                fireworksSoundRef.current = new Audio(soundConfig.fireworks);
                spinAgainSoundRef.current = new Audio(soundConfig.spinAgain);
                
                return () => {
                    if (spinSoundRef.current) spinSoundRef.current.pause();
                    if (fireworksSoundRef.current) fireworksSoundRef.current.pause();
                    if (spinAgainSoundRef.current) spinAgainSoundRef.current.pause();
                };
            }, [wheel.id]);

            const items = React.useMemo(() => {
                let array = [...wheel.items];
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }, [wheel.items]);
            
            const sliceAngle = 360 / items.length;

            const getConicGradient = () => {
                const parts = items.map((_, i) => {
                    const color = WHEEL_COLORS_PALETTE[i % WHEEL_COLORS_PALETTE.length];
                    const finalColor = (i === items.length - 1 && items.length % WHEEL_COLORS_PALETTE.length === 1) ? '#64748b' : color;
                    return `${finalColor} ${i * sliceAngle}deg ${(i + 1) * sliceAngle}deg`;
                });
                return `conic-gradient(${parts.join(', ')})`;
            };

            const fireConfetti = () => {
                const duration = 3 * 1000;
                const animationEnd = Date.now() + duration;
                const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 110 };

                const randomInRange = (min, max) => Math.random() * (max - min) + min;

                const interval = setInterval(function() {
                    const timeLeft = animationEnd - Date.now();
                    if (timeLeft <= 0) return clearInterval(interval);
                    const particleCount = 50 * (timeLeft / duration);
                    confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
                    confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
                }, 250);
            };

            const startSpin = () => {
                if (isSpinning) return;
                
                if (spinSoundRef.current) {
                    spinSoundRef.current.currentTime = 0;
                    spinSoundRef.current.loop = true;
                    spinSoundRef.current.play().catch(e => console.log("Audio play failed", e));
                }
                
                setIsSpinning(true);
                const winnerIndex = Math.floor(Math.random() * items.length);
                const spins = 6; 
                const baseRotation = spins * 360;
                const targetSliceAngle = (winnerIndex * sliceAngle) + (sliceAngle / 2);
                const endRotation = baseRotation + (360 - targetSliceAngle);
                const randomOffset = (Math.random() - 0.5) * (sliceAngle * 0.6);
                const finalRotation = rotation + endRotation + randomOffset - (rotation % 360); 

                setRotation(finalRotation);
                
                setTimeout(() => {
                        setIsSpinning(false);
                        setPrize(items[winnerIndex]);

                        if (spinSoundRef.current) {
                            spinSoundRef.current.loop = false;
                            spinSoundRef.current.pause();
                            spinSoundRef.current.currentTime = 0;
                        }

                        if (fireworksSoundRef.current) {
                            fireworksSoundRef.current.currentTime = 0;
                            fireworksSoundRef.current.play().catch(e => console.log("Fireworks play failed", e));
                            
                            fireworksSoundRef.current.onended = () => {
                                if (spinAgainSoundRef.current) {
                                    spinAgainSoundRef.current.currentTime = 0;
                                    spinAgainSoundRef.current.loop = true;
                                    spinAgainSoundRef.current.play().catch(e => console.log("Spin again audio play failed", e));
                                }
                            };
                        }
                        fireConfetti();
                }, 4600);
            };

            const formatWheelText = (text) => {
                const match = text.match(/\[(.*?)\]/);
                if (match) return `[${match[1]}]`;
                return text.length > 10 ? text.substring(0, 10) + '..' : text;
            };

            const handleModalClose = () => {
                try {
                    if (spinSoundRef.current) { spinSoundRef.current.loop = false; spinSoundRef.current.pause(); spinSoundRef.current.currentTime = 0; }
                    if (fireworksSoundRef.current) { fireworksSoundRef.current.pause(); fireworksSoundRef.current.currentTime = 0; }
                    if (spinAgainSoundRef.current) { spinAgainSoundRef.current.loop = false; spinAgainSoundRef.current.pause(); spinAgainSoundRef.current.currentTime = 0; }
                } catch (e) {
                    console.log('Failed to stop audio on close:', e);
                }
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-3xl z-[100] flex flex-col items-center justify-center p-4 bg-pattern overflow-hidden">
                    {/* Hào quang nền tổng thể */}
                    <div className={`absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-gradient-to-r ${wheel.color} rounded-full blur-[120px] opacity-10 pointer-events-none animate-pulse`}></div>

                    {/* Tiêu đề vòng quay (Thu nhỏ một chút cho cân đối) */}
                    <div className="absolute top-8 w-full text-center px-4 z-50">
                        <h2 className={`text-3xl sm:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r ${wheel.color} uppercase tracking-widest drop-shadow-[0_5px_15px_rgba(255,255,255,0.3)] animate-float-slow`}>
                            {wheel.name}
                        </h2>
                        <div className="flex items-center justify-center gap-2 text-yellow-300 mt-3 font-black bg-slate-900/80 backdrop-blur-md inline-flex px-5 py-1.5 rounded-full border border-yellow-500/50 shadow-[0_0_15px_rgba(234,179,8,0.4)] text-xs sm:text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-pulse"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path><path d="M13 5v2"></path><path d="M13 17v2"></path><path d="M13 11v2"></path></svg>
                            <span className="tracking-wider">PHÍ: {wheel.cost} VÉ</span>
                        </div>
                    </div>

                    {/* Nút X Đóng (Chỉ hiện khi chưa quay và chưa có giải) */}
                    {!isSpinning && !prize && (
                        <button onClick={handleModalClose} className="absolute top-6 right-6 text-slate-400 hover:text-white bg-slate-800/80 p-2.5 rounded-full transition-all border border-slate-600 hover:border-slate-400 hover:scale-110 hover:shadow-[0_0_15px_rgba(255,255,255,0.3)] z-50 group">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="group-hover:rotate-90 transition-transform"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    )}

                    {/* VÒNG QUAY CHÍNH (Ép size gọn lại) */}
                    <div className="relative mt-16 sm:mt-20 sm:scale-100 transition-transform duration-700">
                        {/* Kim chỉ */}
                        <div className="absolute -top-8 left-1/2 -translate-x-1/2 z-40 flex flex-col items-center filter drop-shadow-[0_8px_8px_rgba(0,0,0,0.8)]">
                            <div className="w-10 h-10 bg-gradient-to-b from-slate-700 to-slate-900 rounded-full border-[3px] border-slate-300 flex items-center justify-center shadow-2xl relative z-10">
                                <div className={`w-3 h-3 rounded-full bg-gradient-to-br ${wheel.color} animate-pulse shadow-[0_0_10px_currentColor]`}></div>
                            </div>
                            <div className="w-0 h-0 border-l-[16px] border-l-transparent border-r-[16px] border-r-transparent border-t-[32px] border-t-slate-200 -mt-3 relative z-0"></div>
                            <div className="absolute top-[35px] left-1/2 -translate-x-1/2 w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[24px] border-t-rose-600"></div>
                        </div>

                        {/* Khung Vòng Quay */}
                        <div className="relative p-1.5 rounded-full bg-gradient-to-br from-slate-600 via-slate-800 to-slate-900 shadow-[0_20px_40px_rgba(0,0,0,0.8)] border border-slate-500/40">
                            <div className="relative p-1.5 rounded-full bg-slate-950 shadow-[inset_0_10px_20px_rgba(0,0,0,1)]">
                                <div 
                                    className="w-64 h-64 sm:w-[360px] sm:h-[360px] rounded-full shadow-[inset_0_0_30px_rgba(0,0,0,0.8)] wheel-spin relative overflow-hidden border-[4px] border-slate-800/90"
                                    style={{ background: getConicGradient(), transform: `rotate(${rotation}deg)` }}
                                >
                                    {items.map((item, i) => {
                                        const angle = i * sliceAngle + (sliceAngle / 2);
                                        return (
                                            <div key={i} className="absolute top-0 left-1/2 w-[2px] h-1/2 origin-bottom flex items-start justify-center" style={{ transform: `translateX(-50%) rotate(${angle}deg)` }}>
                                                {/* Text phần thưởng vòng quay: Thu nhỏ gọn lại cho cân đối */}
                                                <div className="mt-4 sm:mt-5 font-bold text-white text-[9px] sm:text-[11px] drop-shadow-[0_2px_2px_rgba(0,0,0,0.9)] whitespace-nowrap tracking-wide" style={{ transform: 'rotate(-90deg)' }}>
                                                    {formatWheelText(item.text)}
                                                </div>
                                            </div>
                                        );
                                    })}
                                    
                                    {/* Lõi tâm vòng quay */}
                                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 sm:w-20 sm:h-20 bg-gradient-to-br from-slate-700 to-slate-950 rounded-full border-[4px] border-slate-800 shadow-[0_0_20px_rgba(0,0,0,1)] z-20 flex items-center justify-center">
                                        <div className={`w-6 h-6 sm:w-8 sm:h-8 bg-gradient-to-br ${wheel.color} rounded-full animate-pulse shadow-[0_0_15px_currentColor] border-2 border-white/40`}></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* KHU VỰC NÚT BẤM (CHỈ HIỆN KHI CHƯA CÓ GIẢI) */}
                    {!prize && (
                        <div className="mt-10 sm:mt-12 min-h-20 flex items-center justify-center w-full relative z-50">
                            {!isSpinning ? (
                                <button onClick={startSpin} className={`relative group px-12 py-4 sm:py-5 rounded-full font-black text-xl sm:text-2xl text-white overflow-hidden transition-all hover:scale-105 active:scale-95 shadow-[0_10px_20px_rgba(0,0,0,0.5)] border-2 border-white/20`}>
                                    <div className={`absolute inset-0 bg-gradient-to-r ${wheel.color} group-hover:brightness-110 transition-all`}></div>
                                    <div className="absolute inset-0 -translate-x-full group-hover:animate-[shimmer_1.5s_infinite] bg-gradient-to-r from-transparent via-white/40 to-transparent skew-x-12"></div>
                                    <span className="relative z-10 drop-shadow-[0_2px_5px_rgba(0,0,0,0.8)] tracking-widest flex items-center gap-2">
                                        ✨ TRIỆU HỒI! ✨
                                    </span>
                                </button>
                            ) : (
                                <div className="text-xl sm:text-2xl font-black text-white italic animate-pulse tracking-widest flex items-center gap-3 bg-slate-900/50 px-6 py-3 rounded-full border border-slate-700 backdrop-blur-sm">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin text-yellow-500"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1-1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg> 
                                    ĐANG CẦU NGUYỆN...
                                </div>
                            )}
                        </div>
                    )}

                    {/* MODAL KẾT QUẢ NỔI LÊN GIỮA MÀN HÌNH (Khắc phục lỗi đẩy layout) */}
                    {prize && (
                        <div className="absolute inset-0 z-[110] flex items-center justify-center bg-slate-950/70 backdrop-blur-sm p-4 animate-in fade-in duration-300">
                            <div className={`glass-card bg-slate-900/95 border-2 rounded-[2rem] p-6 sm:p-10 text-center w-full max-w-md mx-4 animate-in zoom-in-90 duration-500 ${wheel.border} shadow-[0_0_50px_currentColor] relative`}>
                                {/* Icon Hộp Quà */}
                                <div className="absolute -top-8 left-1/2 -translate-x-1/2 text-5xl animate-bounce drop-shadow-2xl">
                                    🎁
                                </div>
                                <h3 className="text-xs sm:text-sm font-bold text-slate-300 uppercase tracking-[0.2em] mb-3 mt-4 flex items-center justify-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-yellow-400 animate-pulse"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1-1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>
                                    VẬN MAY ĐÃ MỈM CƯỜI 
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-yellow-400 animate-pulse"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1-1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>
                                </h3>
                                {/* Tên giải thưởng: Giảm size chữ */}
                                <div className={`text-xl sm:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r ${wheel.color} mb-6 leading-relaxed px-2 drop-shadow-xl break-words`}>
                                    {prize.text}
                                </div>
                                <button onClick={() => {
                                        try {
                                            if (spinSoundRef.current) { spinSoundRef.current.loop = false; spinSoundRef.current.pause(); spinSoundRef.current.currentTime = 0; }
                                            if (fireworksSoundRef.current) { fireworksSoundRef.current.pause(); fireworksSoundRef.current.currentTime = 0; }
                                            if (spinAgainSoundRef.current) { spinAgainSoundRef.current.loop = false; spinAgainSoundRef.current.pause(); spinAgainSoundRef.current.currentTime = 0; }
                                        } catch (e) { console.log('Failed to stop sounds', e); }
                                        if (onRecordPrize && prize) {
                                            onRecordPrize(wheel.name, prize.text, wheel.cost, wheel.color);
                                        }
                                        onFinish(); onClose();
                                    }} className="w-full py-3.5 sm:py-4 rounded-xl font-black text-base sm:text-lg text-slate-900 bg-white hover:bg-slate-200 transition-all active:scale-95 shadow-[0_0_20px_rgba(255,255,255,0.4)] tracking-wider">
                                    ĐÚT TÚI NGAY!
                                </button>
                            </div>
                        </div>
                    )}
                    
                    <style>{`
                        @keyframes shimmer {
                            100% { transform: translateX(100%); }
                        }
                    `}</style>
                </div>
            );
        }
        

        const MOTIVATIONAL_QUOTES = [
            "Hành trình vạn dặm bắt đầu từ một bước chân!",
            "Kỷ luật là cầu nối giữa mục tiêu và thành tựu.",
            "Phần thưởng xứng đáng cho sự nỗ lực của bạn!",
            "Không có áp lực, không có kim cương.",
            "Tiếp tục phát huy nhé, bạn đang làm rất tốt!",
            "Chỉ cần bạn không dừng lại, việc tiến chậm cũng không sao.",
            "Sự cố gắng của ngày hôm nay là thành tựu của ngày mai!",
            "Tuyệt vời! Hãy dùng số vé này thật xứng đáng nhé!",
            "Mỗi phút giây tập trung đều mang bạn đến gần hơn với ước mơ.",
            "Nỗ lực hôm nay, thảnh thơi ngày mai!",
            "Đừng chờ đợi cơ hội, hãy tự tạo ra nó bằng sự chăm chỉ!",
            "Chăm chỉ là phép thuật biến ước mơ thành hiện thực.",
            "Hãy làm việc trong im lặng và để thành công tự lên tiếng.",
            "Mỗi quả cà chua (Pomodoro) hoàn thành là một chiến thắng nhỏ!",
            "Bạn mạnh mẽ và kiên trì hơn bạn nghĩ rất nhiều.",
            "Sự tập trung của bạn bây giờ đáng giá ngàn vàng.",
            "Phép màu không ở đâu xa, nó nằm ngay trong sự nỗ lực của bạn.",
            "Cố gắng thêm một chút nữa thôi, vinh quang đang chờ đón!",
            "Trái ngọt luôn dành cho những người biết kiên nhẫn.",
            "Đừng để ngày hôm qua chiếm quá nhiều thời gian của ngày hôm nay.",
            "Thêm một chút bền bỉ, một chút nỗ lực, và điều tưởng chừng thất bại sẽ biến thành thành công rực rỡ.",
            "Bạn đã chiến thắng được sự lười biếng rồi, xứng đáng nhận vé!"
        ];
        
        // --- COMPONENT CHÍNH ---
        function App() {
            // Khởi tạo state tĩnh ban đầu (Không load từ localStorage nữa)
            const [tickets, setTickets] = useState(10);
            const [spinHistory, setSpinHistory] = useState([]);
            const [wheels, setWheels] = useState([
                { id: 1, name: 'Vòng Khởi Động', mascot: '🐣', cost: 1, color: 'from-blue-500 to-cyan-400', border: 'border-blue-500/30', items: [{ id: '1-1', text: '[SR] Nghỉ 10p' }, { id: '1-2', text: '[R] 20 Hít đất' }, { id: '1-3', text: '[N] Học tiếp' }] },
                { id: 2, name: 'Vòng Tiêu Chuẩn', mascot: '🦊', cost: 4, color: 'from-purple-500 to-pink-500', border: 'border-purple-500/30', items: [{ id: '2-1', text: '[SSR] Xem 1 tập phim' }, { id: '2-2', text: '[SR] Chơi 1 ván game' }] },
                { id: 3, name: 'Vòng Thần Thoại', mascot: '🐉', cost: 8, color: 'from-yellow-400 to-orange-500', border: 'border-yellow-500/30', items: [{ id: '3-1', text: '[LEGEND] Nghỉ luôn tối nay' }] }
            ]);

            const [addAmount, setAddAmount] = useState('1');
            const [showSettings, setShowSettings] = useState(false);
            const [activeWheel, setActiveWheel] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const [editingItemId, setEditingItemId] = useState(null);
            const [editingText, setEditingText] = useState('');
            const [bulkPasteId, setBulkPasteId] = useState(null);
            const [bulkText, setBulkText] = useState('');
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [showClearHistoryConfirm, setShowClearHistoryConfirm] = useState(false);
            const [newItems, setNewItems] = useState({ 1: '', 2: '', 3: '' });
            const [isLoaded, setIsLoaded] = useState(false);
            const [rewardModal, setRewardModal] = useState(null);
            // 2. TẢI DỮ LIỆU TỪ FIREBASE (Chạy 1 lần duy nhất)
            useEffect(() => {
                db.collection("pomodoro").doc("my_game_data").get()
                .then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.tickets !== undefined) setTickets(data.tickets);
                        if (data.wheels) setWheels(data.wheels);
                        if (data.spinHistory) setSpinHistory(data.spinHistory);
                    }
                    // BẬT CHỐT CHẶN: Đã tải xong dữ liệu
                    setIsLoaded(true); 
                }).catch(err => {
                    console.error("Lỗi khi tải dữ liệu từ Firebase:", err);
                    setIsLoaded(true); // Lỗi cũng phải mở chốt để web còn chạy
                });
            }, []);

            // 3. LƯU DỮ LIỆU LÊN FIREBASE MỖI KHI CÓ THAY ĐỔI
            useEffect(() => {
                // CHỈ LƯU KHI DỮ LIỆU ĐÃ ĐƯỢC TẢI XONG TỪ FIREBASE VỀ
                if (isLoaded) {
                    db.collection("pomodoro").doc("my_game_data").set({
                        tickets: tickets,
                        wheels: wheels,
                        spinHistory: spinHistory
                    }, { merge: true })
                    .catch(err => console.error("Lỗi khi lưu dữ liệu lên Firebase:", err));
                }
            }, [tickets, wheels, spinHistory, isLoaded]);

            const handleAddTickets = () => {
                const amount = parseInt(addAmount);
                if (!isNaN(amount) && amount > 0) {
                    setTickets(prev => prev + amount);
                    
                    // Lấy ngẫu nhiên một câu nói
                    const randomQuote = MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)];
                    
                    // Kích hoạt bảng thông báo
                    setRewardModal({ amount: amount, quote: randomQuote });

                    // BẮN PHÁO HOA
                    const duration = 3 * 1000;
                    const animationEnd = Date.now() + duration;
                    const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 200 }; // zIndex 200 để nằm trên cùng

                    const randomInRange = (min, max) => Math.random() * (max - min) + min;

                    const interval = setInterval(function() {
                        const timeLeft = animationEnd - Date.now();
                        if (timeLeft <= 0) {
                            return clearInterval(interval);
                        }
                        const particleCount = 50 * (timeLeft / duration);
                        // Hàm confetti đã được nhúng sẵn từ thư viện
                        confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
                        confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
                    }, 250);
                }
            };

            const handleSubtractTickets = () => {
                const amount = parseInt(addAmount);
                if (!isNaN(amount) && amount > 0) {
                    setTickets(prev => Math.max(0, prev - amount));
                }
            };

            const handleUpdateWheelConfig = (wId, field, value) => {
                setWheels(prev => prev.map(w => w.id === wId ? { ...w, [field]: value } : w));
            };
            
            const handleAddItem = (wId) => {
                if (!newItems[wId].trim()) return;
                setWheels(prev => prev.map(w => w.id === wId ? { ...w, items: [{ id: Date.now().toString() + Math.random(), text: newItems[wId] }, ...w.items] } : w));
                setNewItems({ ...newItems, [wId]: '' });
            };

            const handleRemoveItem = (wId, iId) => {
                setWheels(prev => prev.map(w => w.id === wId ? { ...w, items: w.items.filter(i => i.id !== iId) } : w));
            };

            const saveEdit = (wId) => {
                if (!editingText.trim()) return;
                setWheels(prev => prev.map(w => {
                    if (w.id === wId) {
                        return { ...w, items: w.items.map(item => item.id === editingItemId ? { ...item, text: editingText } : item) };
                    }
                    return w;
                }));
                setEditingItemId(null);
            };

            const handleBulkUpdate = () => {
                if (!bulkText.trim()) { setBulkPasteId(null); return; }
                const lines = bulkText.split('\n').map(l => l.trim()).filter(l => l !== '');
                const newItemsList = lines.map(l => ({ id: Date.now().toString() + Math.random(), text: l }));
                setWheels(prev => prev.map(w => w.id === bulkPasteId ? { ...w, items: newItemsList } : w));
                setBulkPasteId(null);
                setBulkText('');
            };

            const performReset = () => {
                setTickets(0);
                setShowResetConfirm(false);
            };

            const addToHistory = (wheelName, prize, cost, wheelColor) => {
                const now = new Date();
                const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                const newEntry = {
                    id: Date.now().toString(),
                    wheelName,
                    prize,
                    cost,
                    wheelColor,
                    time: timeStr,
                    timestamp: now.getTime()
                };
                setSpinHistory(prev => [newEntry, ...prev].slice(0, 10));
            };

            const getRelativeDate = (timestamp) => {
                // Xử lý dữ liệu cũ không có timestamp
                if (!timestamp) return '';
                
                const recordDate = new Date(timestamp);
                
                // Kiểm tra ngày hợp lệ
                if (isNaN(recordDate.getTime())) return '';
                
                const today = new Date();
                const targetDate = new Date(recordDate);
                
                // Đưa cả 2 mốc thời gian về 00:00:00 của ngày đó để so sánh chính xác số ngày
                today.setHours(0, 0, 0, 0);
                targetDate.setHours(0, 0, 0, 0);
                
                const diffTime = today.getTime() - targetDate.getTime();
                const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
                
                if (diffDays === 0) {
                    return 'Hôm nay';
                } else if (diffDays === 1) {
                    return 'Hôm qua';
                } else {
                    const day = String(recordDate.getDate()).padStart(2, '0');
                    const month = String(recordDate.getMonth() + 1).padStart(2, '0');
                    return `${day}/${month}`;
                }
            };

            const deleteFromHistory = (id) => {
                setSpinHistory(prev => prev.filter(item => item.id !== id));
            };

            const clearHistory = () => {
                setShowClearHistoryConfirm(true);
            };

            const confirmClearHistory = () => {
                setSpinHistory([]);
                setShowClearHistoryConfirm(false);
            };

            const getColorClassesFromWheel = (wheelColor) => {
                if (!wheelColor) {
                    return { text: 'text-emerald-300', border: 'border-l-emerald-500', bag: 'from-emerald-500 to-emerald-600' };
                }
                if (wheelColor.includes('blue') && wheelColor.includes('cyan')) {
                    return { text: 'text-cyan-400', border: 'border-l-cyan-500', bag: 'from-blue-500 to-cyan-400' };
                } else if (wheelColor.includes('purple') && wheelColor.includes('pink')) {
                    return { text: 'text-pink-500', border: 'border-l-pink-500', bag: 'from-purple-500 to-pink-500' };
                } else if (wheelColor.includes('yellow') || wheelColor.includes('orange')) {
                    return { text: 'text-orange-500', border: 'border-l-orange-500', bag: 'from-yellow-400 to-orange-500' };
                }
                return { text: 'text-emerald-300', border: 'border-l-emerald-500', bag: 'from-emerald-500 to-emerald-600' };
            };

            const openWheel = (w) => {
                if (tickets < w.cost) {
                    setErrorMsg(`Bạn không đủ Vé! Cần thêm ${w.cost - tickets} Vé nữa.`);
                    setTimeout(() => setErrorMsg(''), 3000);
                    return;
                }
                if (w.items.length < 2) {
                    setErrorMsg('Vòng quay cần ít nhất 2 phần thưởng để hoạt động.');
                    setTimeout(() => setErrorMsg(''), 3000);
                    return;
                }
                setActiveWheel(w);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto">
                    {/* Header Cực Ngầu & Bảng Điều Khiển */}
                    <div className="flex flex-col lg:flex-row items-center justify-between gap-6 p-6 md:p-8 rounded-[2rem] border border-slate-700/50 shadow-[0_10px_40px_rgba(0,0,0,0.5)] mb-8 relative overflow-hidden bg-slate-900/60 backdrop-blur-xl">
                        {/* Hiệu ứng ánh sáng nền ở Header */}
                        <div className="absolute top-0 right-0 w-64 h-64 bg-rose-500/10 rounded-full blur-3xl pointer-events-none"></div>
                        <div className="absolute bottom-0 left-0 w-64 h-64 bg-amber-500/10 rounded-full blur-3xl pointer-events-none"></div>

                        {/* 1. Khu vực Logo & Tiêu đề */}
                        <div className="flex items-center gap-5 relative z-10 group cursor-default w-full lg:w-auto justify-center lg:justify-start">
                            
                            
                            <div className="flex flex-col text-center lg:text-left">
                                <h1 className="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-rose-400 via-orange-400 to-amber-400 tracking-tight drop-shadow-lg uppercase">
                                    Pomodoro Gacha
                                </h1>
                                <p className="text-slate-400 text-[10px] md:text-xs font-black tracking-widest mt-1.5 uppercase flex items-center justify-center lg:justify-start gap-2">
                                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>
                                    Nghịch thiên mà tiến
                                </p>
                            </div>
                        </div>

                        {/* 2. Khu vực Điều khiển & Số Vé */}
                        <div className="flex flex-col sm:flex-row items-center gap-5 w-full lg:w-auto relative z-10">
                            {/* Khung hiển thị vé kính trong suốt */}
                            <div className="relative group min-w-[150px] w-full sm:w-auto cursor-default">
                                <div className="absolute inset-0 bg-gradient-to-r from-yellow-500/20 to-amber-600/20 blur-xl rounded-2xl group-hover:from-yellow-500/40 group-hover:to-amber-500/40 transition-all duration-500 -z-10"></div>
                                <div className="relative bg-slate-900/80 backdrop-blur-md border-2 border-yellow-500/30 group-hover:border-yellow-400/60 rounded-2xl px-5 py-3 flex items-center justify-between shadow-[0_10px_30px_rgba(0,0,0,0.5)] transition-all duration-500 group-hover:-translate-y-1">
                                    <div className="flex flex-col">
                                        <span className="text-yellow-500/80 text-[10px] font-black uppercase tracking-widest mb-1">
                                            KHO VÉ
                                        </span>
                                        <div className="flex items-baseline gap-1.5">
                                            <span className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 via-yellow-300 to-amber-500 drop-shadow-md">
                                                {tickets}
                                            </span>
                                        </div>
                                    </div>
                                    <div className="text-3xl drop-shadow-[0_0_15px_rgba(234,179,8,0.5)] group-hover:rotate-12 group-hover:scale-110 transition-transform duration-500">
                                        🎟️
                                    </div>
                                </div>
                            </div>

                            {/* Các nút bấm giữ nguyên chức năng của bạn */}
                            <div className="flex flex-wrap justify-center gap-2 w-full sm:w-auto">
                                <div className="flex bg-slate-900 rounded-xl overflow-hidden border border-slate-700 h-12 shadow-inner">
                                    <button onClick={handleSubtractTickets} className="bg-slate-800 hover:bg-slate-700 px-3 font-black text-red-400 border-r border-slate-700 transition-colors">-</button>
                                    <input type="number" value={addAmount} onChange={e => setAddAmount(e.target.value)} className="w-10 bg-transparent text-center font-bold focus:outline-none text-sm text-white" />
                                    <button onClick={handleAddTickets} className="bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 px-3 font-black text-white text-[11px] md:text-xs transition-all shadow-inner">NHẬN VÉ</button>
                                </div>
                                
                                <button onClick={() => setShowSettings(!showSettings)} className={`p-3 rounded-xl border transition-all shadow-md ${showSettings ? 'bg-white text-slate-900 shadow-[0_0_15px_rgba(255,255,255,0.5)]' : 'bg-slate-800 text-slate-400 border-slate-600 hover:border-slate-400 hover:text-white'}`}>
                                    <Settings className="w-5 h-5" />
                                </button>
                                
                                <button onClick={() => setShowResetConfirm(true)} className="bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-500 hover:to-orange-500 px-3 py-2 rounded-xl border border-red-400/50 text-white font-bold text-[10px] md:text-xs flex items-center gap-1 transition-all shadow-[0_0_15px_rgba(220,38,38,0.4)] hover:scale-105">
                                    <Flame className="w-4 h-4" /> PHẠM LUẬT
                                </button>
                            </div>
                        </div>
                    </div>

                    {errorMsg && <div className="bg-red-500/20 border border-red-500 text-red-200 p-4 rounded-2xl text-center mb-6 font-bold animate-pulse">{errorMsg}</div>}


                    {/* Settings UI */}
                    {showSettings && (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 animate-in slide-in-from-top duration-300">
                            {wheels.map(w => (
                                <div key={w.id} className="bg-slate-800 p-5 rounded-3xl border border-slate-700 space-y-4 shadow-lg">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <h3 className="font-black text-xs text-slate-500 uppercase tracking-widest flex items-center gap-2">
                                                <div className={`w-2 h-2 rounded-full bg-gradient-to-r ${w.color}`}></div>
                                                Vòng {w.id}
                                            </h3>
                                            <p className="text-[10px] text-slate-400 mt-1">{w.items.length} phần thưởng</p>
                                        </div>
                                        <button onClick={() => { setBulkPasteId(w.id); setBulkText(w.items.map(i => i.text).join('\n')); }} className="text-[10px] font-bold bg-slate-700 hover:bg-slate-600 text-slate-300 px-2 py-1 rounded-md transition-colors flex items-center gap-1">
                                            <Clipboard className="w-3 h-3" /> Dán nhanh
                                        </button>
                                    </div>
                                    <div className="space-y-3 text-xs">
                                        <input type="text" value={w.name} onChange={e => handleUpdateWheelConfig(w.id, 'name', e.target.value)} className="w-full bg-slate-900 rounded-lg px-3 py-2 focus:ring-1 focus:ring-blue-500 outline-none" placeholder="Tên vòng quay" />
                                        <div className="flex items-center gap-2 bg-slate-900 rounded-lg px-3">
                                            <span className="text-slate-500 font-bold uppercase text-[9px]">Giá:</span>
                                            <input type="number" value={w.cost} onChange={e => handleUpdateWheelConfig(w.id, 'cost', parseInt(e.target.value) || 0)} className="flex-1 bg-transparent py-2 outline-none" />
                                        </div>
                                        
                                        {/* --- CÀI ĐẶT GIỜ QUAY --- */}
                                        <div className="bg-slate-900 p-3 rounded-lg border border-slate-700">
                                            <label className="flex items-center gap-2 cursor-pointer mb-2">
                                                <input 
                                                    type="checkbox" 
                                                    checked={!!w.hasTimeLimit}
                                                    onChange={e => {
                                                        const isChecked = e.target.checked;
                                                        // Khởi tạo khung giờ mặc định nếu chưa có
                                                        const initialFrames = w.timeFrames ? w.timeFrames : [{ start: 0, end: 23 }];
                                                        handleUpdateWheelConfig(w.id, 'hasTimeLimit', isChecked);
                                                        if (isChecked && !w.timeFrames) {
                                                            handleUpdateWheelConfig(w.id, 'timeFrames', initialFrames);
                                                        }
                                                    }}
                                                    className="w-4 h-4 accent-blue-500 rounded cursor-pointer"
                                                />
                                                <span className="text-slate-400 font-bold text-xs">Giới hạn giờ quay</span>
                                            </label>
                                            
                                            {/* Danh sách các khung giờ */}
                                            {w.hasTimeLimit && (
                                                <div className="mt-3 space-y-2 animate-in fade-in duration-200">
                                                    {(w.timeFrames || [{start: w.timeStart || 0, end: w.timeEnd || 23}]).map((frame, idx) => (
                                                        <div key={idx} className="flex items-center gap-2 bg-slate-800 p-2 rounded-lg border border-slate-700 relative group">
                                                            <div className="flex flex-col flex-1">
                                                                <span className="text-[9px] text-slate-500 mb-1">Từ (Giờ)</span>
                                                                <input 
                                                                    type="number" min="0" max="23"
                                                                    value={frame.start === '' ? '' : frame.start} 
                                                                    onChange={e => {
                                                                        const val = e.target.value;
                                                                        const newFrames = [...(w.timeFrames || [{start: w.timeStart || 0, end: w.timeEnd || 23}])];
                                                                        newFrames[idx].start = val === '' ? '' : parseInt(val);
                                                                        handleUpdateWheelConfig(w.id, 'timeFrames', newFrames);
                                                                    }} 
                                                                    className="w-full bg-slate-900 rounded px-2 py-1.5 text-center outline-none border border-slate-600 focus:border-blue-500 transition-colors" 
                                                                />
                                                            </div>
                                                            <span className="text-slate-500 mt-4">-</span>
                                                            <div className="flex flex-col flex-1">
                                                                <span className="text-[9px] text-slate-500 mb-1">Đến (Giờ)</span>
                                                                <input 
                                                                    type="number" min="0" max="23"
                                                                    value={frame.end === '' ? '' : frame.end} 
                                                                    onChange={e => {
                                                                        const val = e.target.value;
                                                                        const newFrames = [...(w.timeFrames || [{start: w.timeStart || 0, end: w.timeEnd || 23}])];
                                                                        newFrames[idx].end = val === '' ? '' : parseInt(val);
                                                                        handleUpdateWheelConfig(w.id, 'timeFrames', newFrames);
                                                                    }} 
                                                                    className="w-full bg-slate-900 rounded px-2 py-1.5 text-center outline-none border border-slate-600 focus:border-blue-500 transition-colors" 
                                                                />
                                                            </div>
                                                            
                                                            {/* Nút xóa khung giờ (chỉ hiện khi di chuột vào) */}
                                                            <button 
                                                                onClick={() => {
                                                                    const currentFrames = w.timeFrames || [{start: w.timeStart || 0, end: w.timeEnd || 23}];
                                                                    if (currentFrames.length > 1) {
                                                                        const newFrames = currentFrames.filter((_, i) => i !== idx);
                                                                        handleUpdateWheelConfig(w.id, 'timeFrames', newFrames);
                                                                    } else {
                                                                        // Nếu chỉ còn 1 khung thì làm rỗng nó thay vì xóa mất
                                                                        handleUpdateWheelConfig(w.id, 'timeFrames', [{start: '', end: ''}]);
                                                                    }
                                                                }}
                                                                className="absolute -top-2 -right-2 bg-red-500 hover:bg-red-400 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity shadow-lg"
                                                                title="Xóa khung giờ này"
                                                            >
                                                                <X className="w-3 h-3" />
                                                            </button>
                                                        </div>
                                                    ))}
                                                    
                                                    {/* Nút thêm khung giờ */}
                                                    <button 
                                                        onClick={() => {
                                                            const newFrames = [...(w.timeFrames || [{start: w.timeStart || 0, end: w.timeEnd || 23}]), {start: '', end: ''}];
                                                            handleUpdateWheelConfig(w.id, 'timeFrames', newFrames);
                                                        }}
                                                        className="w-full py-2 mt-2 border border-dashed border-slate-600 text-slate-400 rounded-lg text-xs hover:bg-slate-800 hover:border-blue-500 hover:text-blue-400 transition-colors flex items-center justify-center gap-1 font-bold"
                                                    >
                                                        <Plus className="w-4 h-4" /> Thêm khung giờ
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Wheels List - Giao diện Header Banner giống ảnh mẫu */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mt-6">
                        {wheels.map(w => {
                            // --- LOGIC KIỂM TRA ---
                            const currentHour = new Date().getHours();
                            let isTimeValid = true;
                            let timeDisplayStr = "";
                            if (w.hasTimeLimit) {
                                const frames = w.timeFrames || [{start: w.timeStart || 0, end: w.timeEnd || 23}];
                                const validFrames = frames.filter(f => f.start !== '' && f.end !== '' && !isNaN(f.start) && !isNaN(f.end));
                                if (validFrames.length > 0) {
                                    isTimeValid = validFrames.some(f => currentHour >= f.start && currentHour <= f.end);
                                    timeDisplayStr = validFrames.map(f => `${f.start}h-${f.end}h`).join(', ');
                                }
                            }
                            const canAfford = tickets >= w.cost;
                            const canSpin = isTimeValid && canAfford;

                            // Lấy linh vật hoặc dùng mặc định nếu lỡ xóa mất
                            const defaultMascots = {1: '🐣', 2: '🦊', 3: '🐉'};
                            const mascot = w.mascot || defaultMascots[w.id] || '✨';

                            return (
                                <div key={w.id} className="relative group pt-4"> 
                                    {/* Linh vật nổi lên ở trên cùng góc phải */}
                                    <div className="absolute -top-4 -right-4 text-6xl drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)] z-20 group-hover:scale-125 group-hover:-rotate-12 transition-transform duration-500 animate-bounce cursor-default" style={{ animationDuration: `${2 + w.id}s` }}>
                                        {mascot}
                                    </div>

                                    {/* Hiệu ứng Ánh sáng (Glow) phía sau card khi hover */}
                                    <div className={`absolute inset-0 top-4 bg-gradient-to-br ${w.color} opacity-0 group-hover:opacity-30 blur-2xl transition-opacity duration-500 rounded-[2.5rem] -z-10`}></div>

                                    <div className={`relative bg-slate-800/90 backdrop-blur-sm rounded-[2.5rem] border-2 transition-all duration-500 flex flex-col overflow-hidden shadow-2xl h-full ${canSpin ? `${w.border} group-hover:-translate-y-2 group-hover:shadow-[0_20px_40px_-10px_currentColor]` : 'border-slate-700 opacity-80'}`}>
                                        
                                        {/* HEADER BANNER */}
                                        <div className={`p-7 bg-gradient-to-br ${w.color} relative overflow-hidden`}>
                                            {/* Họa tiết in chìm siêu to khổng lồ bên trong header */}
                                            <div className="absolute -right-6 -bottom-8 text-8xl opacity-20 rotate-12 pointer-events-none drop-shadow-md">
                                                {mascot}
                                            </div>

                                            <div className="flex items-baseline gap-2 relative z-10">
                                                <h2 className="text-2xl font-black text-white uppercase tracking-tight drop-shadow-md">
                                                    {w.name}
                                                </h2>
                                                <span className="text-xs font-bold text-white/90 bg-black/20 px-2 py-0.5 rounded-full border border-white/10">({w.items.length})</span>
                                            </div>
                                            <div className="inline-block mt-3 bg-black/30 backdrop-blur-md px-3 py-1 rounded-full border border-white/20 shadow-inner">
                                                <p className="text-white text-[11px] font-black tracking-widest flex items-center gap-1.5">
                                                    <Ticket className="w-3 h-3 text-yellow-300"/> {w.cost} VÉ / LẦN
                                                </p>
                                            </div>
                                        </div>

                                        {/* PHẦN NÚT BẤM VÀ GIỜ */}
                                        <div className="p-5 mt-auto flex flex-col gap-3 w-full box-border bg-slate-900/40 rounded-b-[2.5rem]">
                                            {/* Cảnh báo giờ quay (Tag nhỏ) */}
                                            {w.hasTimeLimit && timeDisplayStr && (
                                                <div className={`text-[10px] font-bold text-center py-2 px-3 rounded-xl border flex justify-center items-center gap-1.5 w-full ${isTimeValid ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30' : 'bg-red-500/10 text-red-400 border-red-500/30'}`}>
                                                    <span className="animate-pulse">⏳</span> Mở quay: {timeDisplayStr}
                                                </div>
                                            )}

                                            <button 
                                                onClick={() => canSpin && openWheel(w)}
                                                disabled={!canSpin}
                                                className={`w-full mx-auto py-3.5 rounded-2xl font-black text-sm tracking-widest transition-all shadow-md flex items-center justify-center gap-2 text-center
                                                    ${canSpin 
                                                        ? `bg-gradient-to-r ${w.color} text-white hover:brightness-110 active:scale-95 border-none` 
                                                        : 'bg-slate-800 text-slate-500 cursor-not-allowed border border-slate-700'}`}
                                            >
                                                {!isTimeValid ? '🔒 CHƯA ĐẾN GIỜ' : '✨ TRIỆU HỒI NGAY'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* MODAL: RESET CONFIRMATION */}
                    {showResetConfirm && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                            <div className="bg-slate-800 border border-slate-700 w-full max-w-sm rounded-3xl p-6 shadow-2xl animate-in zoom-in-95">
                                <div className="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <AlertCircle className="w-8 h-8 text-red-500" />
                                </div>
                                <h3 className="text-xl font-black text-white text-center mb-2">XÁC NHẬN RESET?</h3>
                                <p className="text-slate-400 text-center text-sm mb-6">Hành động này sẽ xóa toàn bộ số Vé hiện có về 0. Bạn có chắc chắn không?</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowResetConfirm(false)} className="flex-1 py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold text-white transition-all">HỦY</button>
                                    <button onClick={performReset} className="flex-1 py-3 bg-red-600 hover:bg-red-500 rounded-xl font-black text-white transition-all shadow-lg shadow-red-500/20">RESET NGAY</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: BULK PASTE */}
                    {bulkPasteId && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[110] flex items-center justify-center p-4">
                            <div className="bg-slate-800 border border-slate-700 w-full max-w-xl rounded-[2rem] p-8 shadow-2xl flex flex-col gap-6 animate-in zoom-in-95">
                                <div>
                                    <h3 className="text-2xl font-black text-white uppercase italic">Dán danh sách phần thưởng</h3>
                                    <p className="text-slate-400 text-sm mt-1">Mỗi dòng văn bản bên dưới sẽ trở thành một giải thưởng mới.</p>
                                </div>
                                <textarea autoFocus placeholder="Ví dụ:&#10;Giải 1&#10;Giải 2..." value={bulkText} onChange={e => setBulkText(e.target.value)} className="w-full h-64 bg-slate-900 border border-slate-700 rounded-2xl p-4 text-slate-200 focus:outline-none focus:border-blue-500 font-mono text-sm resize-none custom-scrollbar" />
                                <div className="flex gap-3">
                                    <button onClick={() => setBulkPasteId(null)} className="flex-1 py-4 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold text-white transition-all">HỦY</button>
                                    <button onClick={handleBulkUpdate} className="flex-[2] py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-black text-white transition-all shadow-lg">LƯU DANH SÁCH</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* LỊCH SỬ QUAY - BẢNG PHONG THẦN */}
                    {spinHistory.length > 0 && (
                        <div className="mt-12 glass-card rounded-[2.5rem] border border-slate-700/60 p-6 sm:p-8 shadow-[0_10px_40px_rgba(0,0,0,0.5)] relative overflow-hidden">
                            {/* Hiệu ứng sương mù phát sáng mờ ảo ở các góc */}
                            <div className="absolute top-0 right-0 w-64 h-64 bg-emerald-500/5 rounded-full blur-3xl pointer-events-none"></div>
                            <div className="absolute bottom-0 left-0 w-64 h-64 bg-blue-500/5 rounded-full blur-3xl pointer-events-none"></div>
                            
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 relative z-10 gap-4 border-b border-slate-700/50 pb-5">
                                <div className="flex items-center gap-3">
                                    <span className="text-4xl drop-shadow-md animate-bounce" style={{ animationDuration: '3s' }}>📜</span>
                                    <h3 className="text-xl sm:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 tracking-wider">
                                        Lịch Sử Quay
                                    </h3>
                                </div>
                                <button onClick={clearHistory} className="px-5 py-2.5 bg-rose-500/10 hover:bg-rose-500/20 border border-rose-500/30 rounded-xl font-bold text-rose-400 text-xs sm:text-sm transition-all shadow-[0_0_15px_rgba(244,63,94,0.1)] flex items-center gap-2 hover:scale-105 active:scale-95 group">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="group-hover:rotate-12 transition-transform"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                                    XÓA SỔ
                                </button>
                            </div>

                            {/* Danh sách cuộn mượt mà */}
                            <div className="space-y-4 relative z-10 max-h-[450px] overflow-y-auto pr-2" style={{ scrollbarWidth: 'thin', scrollbarColor: '#334155 transparent' }}>
                                {spinHistory.map((record, index) => {
                                    const colors = getColorClassesFromWheel(record.wheelColor);
                                    const relativeDate = getRelativeDate(record.timestamp);
                                    
                                    return (
                                    <div key={record.id} className="group relative bg-slate-900/40 hover:bg-slate-800/80 backdrop-blur-sm p-4 sm:p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 rounded-2xl transition-all duration-300 border border-slate-700/50 hover:border-slate-500/50 hover:shadow-lg hover:-translate-y-1 animate-in fade-in zoom-in-95" style={{ animationDelay: `${Math.min(index * 50, 500)}ms`, animationFillMode: 'both' }}>
                                        
                                        {/* Dải màu viền bên trái bám sát viền mượt hơn */}
                                        <div className={`absolute left-0 top-0 bottom-0 w-1.5 rounded-l-2xl bg-gradient-to-b ${colors.bag} opacity-60 group-hover:opacity-100 transition-opacity shadow-[0_0_10px_currentColor]`}></div>

                                        <div className="flex items-start sm:items-center gap-4 flex-1 pl-3">
                                            {/* Khung thời gian kiểu lịch */}
                                            <div className="flex flex-col items-center justify-center min-w-[70px]">
                                                <span className={`text-[10px] font-black uppercase tracking-wider ${colors.text} opacity-80 mb-0.5`}>
                                                    {relativeDate || 'Hôm nay'}
                                                </span>
                                                <span className="text-sm font-black text-slate-200 bg-slate-950/60 px-2.5 py-1 rounded-lg border border-slate-700/80 shadow-inner">
                                                    {record.time}
                                                </span>
                                            </div>
                                            
                                            {/* Đường gạch dọc mờ phân cách */}
                                            <div className="hidden sm:block w-px h-10 bg-slate-700/50"></div>

                                            {/* Cụm thông tin phần thưởng */}
                                            <div className="flex-1 min-w-0">
                                                <p className="text-[10px] font-bold text-slate-400 uppercase leading-none mb-1.5 flex items-center gap-1.5">
                                                    <span className={`w-2 h-2 rounded-full animate-pulse bg-gradient-to-r ${colors.bag}`}></span>
                                                    {record.wheelName}
                                                </p>
                                                <p className={`font-black text-base sm:text-lg truncate drop-shadow-md ${colors.text}`}>
                                                    {record.prize}
                                                </p>
                                            </div>
                                        </div>

                                        {/* Khung Phí Vé & Nút Xóa */}
                                        <div className="flex items-center justify-between sm:justify-end gap-5 border-t border-slate-700/50 sm:border-none pt-3 sm:pt-0 pl-3 sm:pl-0">
                                            <div className="flex items-center gap-2 bg-slate-950/40 px-3 py-1.5 rounded-xl border border-yellow-500/20 shadow-inner">
                                                <span className="text-[11px] font-bold text-slate-400">Đã tiêu:</span>
                                                <span className="text-sm font-black text-yellow-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.5)]">-{record.cost} vé</span>
                                            </div>
                                            <button onClick={() => deleteFromHistory(record.id)} className="text-slate-600 hover:text-rose-400 sm:opacity-0 group-hover:opacity-100 transition-all p-2.5 sm:bg-slate-900/80 rounded-full hover:bg-rose-500/10 hover:shadow-[0_0_15px_rgba(244,63,94,0.3)] border border-transparent hover:border-rose-500/30" title="Xóa bản ghi này">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                            </button>
                                        </div>
                                    </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {showClearHistoryConfirm && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                            <div className="bg-slate-800 border border-slate-700 w-full max-w-sm rounded-3xl p-6 shadow-2xl animate-in zoom-in-95">
                                <div className="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <AlertCircle className="w-8 h-8 text-red-500" />
                                </div>
                                <h3 className="text-xl font-black text-white text-center mb-2">XÁC NHẬN XÓA?</h3>
                                <p className="text-slate-400 text-center text-sm mb-6">Hành động này sẽ xóa toàn bộ lịch sử quay. Bạn có chắc chắn không?</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowClearHistoryConfirm(false)} className="flex-1 py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold text-white transition-all">HỦY</button>
                                    <button onClick={confirmClearHistory} className="flex-1 py-3 bg-red-600 hover:bg-red-500 rounded-xl font-black text-white transition-all shadow-lg shadow-red-500/20">XÓA NGAY</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: CHÚC MỪNG NHẬN VÉ (TOÀN MÀN HÌNH - TRONG SUỐT) */}
                    {rewardModal && (
                        <div className="fixed inset-0 z-[150] flex flex-col items-center justify-center bg-black/70 backdrop-blur-md p-4 animate-in fade-in duration-300" onClick={() => setRewardModal(null)}>
                            <div className="flex flex-col items-center justify-center text-center transform scale-100 animate-in zoom-in-95 duration-500 w-full" onClick={e => e.stopPropagation()}>
                                <div className="text-7xl mb-6 animate-bounce">🎉</div>
                                <h3 className="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-4 uppercase drop-shadow-[0_0_15px_rgba(52,211,153,0.5)]">
                                    Thank you!
                                </h3>
                                
                                <p className="text-xl md:text-2xl text-slate-200 mb-12 font-medium">
                                    Cảm ơn sự cố gắng của cậu <br/>
                                    <span className="text-7xl md:text-8xl font-black text-yellow-400 drop-shadow-[0_0_20px_rgba(250,204,21,0.6)] mx-2">{rewardModal.amount}</span> 
                                    <span className="text-3xl font-bold text-yellow-500">VÉ</span>
                                </p>

                                <div className="relative max-w-3xl px-8 py-4 mb-10">
                                    <span className="text-6xl text-emerald-500/30 absolute -top-4 left-0 leading-none font-serif">"</span>
                                    <p className="text-emerald-100 font-bold italic relative z-10 text-2xl md:text-3xl leading-relaxed drop-shadow-lg">
                                        {rewardModal.quote}
                                    </p>
                                    <span className="text-6xl text-emerald-500/30 absolute -bottom-8 right-0 leading-none font-serif">"</span>
                                </div>

                                <button 
                                    onClick={() => setRewardModal(null)}
                                    className="px-10 py-4 bg-white/10 hover:bg-white/20 border border-white/20 backdrop-blur-lg rounded-full font-black text-white text-lg transition-all shadow-[0_0_30px_rgba(255,255,255,0.1)] active:scale-95 flex items-center gap-2"
                                >
                                    CẤT VÀO TÚI NGAY
                                </button>
                            </div>
                        </div>
                    )}
            
                    {activeWheel && (
                        <SpinWheelModal 
                            wheel={activeWheel} 
                            onClose={() => setActiveWheel(null)} 
                            onRecordPrize={(wheelName, prize, cost, wheelColor) => {
                                addToHistory(wheelName, prize, cost, wheelColor);
                                
                                let deductedCost = cost;
                                let bonus = 0;
                                const prizeTextLower = prize.toLowerCase();

                                // 1. Xử lý "Giữ vé"
                                if (prizeTextLower.includes("giữ vé")) {
                                    deductedCost = 0;
                                }

                                // 2. Xử lý "Tặng X vé"
                                const bonusMatch = prizeTextLower.match(/tặng\s+(\d+)\s+vé/);
                                if (bonusMatch) {
                                    bonus = parseInt(bonusMatch[1], 10);
                                }

                                // 3. Cập nhật lại tổng số vé
                                setTickets(prevTickets => prevTickets - deductedCost + bonus);

                                // 4. NẾU CÓ TẶNG VÉ -> HIỆN POPUP CHÚC MỪNG VÀ BẮN PHÁO HOA
                                if (bonus > 0) {
                                    // Delay 300ms để vòng quay đóng lại cho mượt rồi mới hiện popup
                                    setTimeout(() => {
                                        // Lấy ngẫu nhiên câu nói
                                        const randomQuote = MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)];
                                        
                                        // Mở modal chúc mừng
                                        setRewardModal({ amount: bonus, quote: randomQuote });

                                        // Hiệu ứng bắn pháo hoa
                                        const duration = 3 * 1000;
                                        const animationEnd = Date.now() + duration;
                                        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 200 }; // zIndex 200 để nổi lên trên cùng
                                        const randomInRange = (min, max) => Math.random() * (max - min) + min;

                                        const interval = setInterval(function() {
                                            const timeLeft = animationEnd - Date.now();
                                            if (timeLeft <= 0) {
                                                return clearInterval(interval);
                                            }
                                            const particleCount = 50 * (timeLeft / duration);
                                            confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
                                            confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
                                        }, 250);
                                    }, 300);
                                }
                            }}
                            onFinish={() => setActiveWheel(null)}
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
